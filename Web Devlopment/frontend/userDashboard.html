<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Dashboard - Safar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--orange:#F97316;--dark-orange:#C2410C;--black:#0D0D0D;--card:#161616;--white:#FAFAFA;--gray:#6B7280;--success:#10B981;--pending:#F59E0B;}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white);min-height:100vh;}
nav{display:flex;justify-content:space-between;align-items:center;padding:18px 60px;background:rgba(0,0,0,0.95);border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:100;}
nav h2{font-family:'Playfair Display',serif;color:var(--orange);font-size:22px;}
.nav-btns{display:flex;gap:10px;}
.nav-btn{padding:7px 16px;background:transparent;border:1px solid rgba(255,255,255,0.18);color:var(--white);cursor:pointer;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s;}
.nav-btn:hover{background:var(--orange);border-color:var(--orange);}
.page-header{padding:40px 60px 20px;}
.page-header h1{font-family:'Playfair Display',serif;font-size:36px;margin-bottom:6px;}
.page-header p{color:var(--gray);font-size:15px;}
.stats-row{display:flex;gap:20px;padding:0 60px 30px;flex-wrap:wrap;}
.stat-card{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px 24px;flex:1;min-width:140px;}
.stat-card .num{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--orange);}
.stat-card .lbl{font-size:13px;color:var(--gray);margin-top:4px;}
.tabs{display:flex;gap:4px;padding:0 60px;margin-bottom:30px;border-bottom:1px solid rgba(255,255,255,0.06);}
.tab{padding:12px 24px;background:transparent;border:none;color:var(--gray);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;border-bottom:2px solid transparent;transition:all 0.2s;margin-bottom:-1px;}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:600;}
.tab:hover{color:var(--white);}
.tab-content{padding:0 60px 60px;display:none;}
.tab-content.active{display:block;}
.booking-card{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;transition:border-color 0.2s;animation:fadeUp 0.4s ease both;}
.booking-card:hover{border-color:rgba(249,115,22,0.3);}
.booking-icon{width:54px;height:54px;border-radius:12px;background:rgba(249,115,22,0.12);border:1px solid rgba(249,115,22,0.25);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.booking-info{flex:1;}
.booking-info h4{font-size:16px;font-weight:600;margin-bottom:6px;}
.booking-info .meta{display:flex;flex-wrap:wrap;gap:12px;font-size:13px;color:var(--gray);}
.booking-right{text-align:right;flex-shrink:0;}
.booking-right .price{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--orange);}
.booking-right .price small{font-size:12px;color:var(--gray);}
.status-badge{display:inline-block;padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600;margin-top:8px;}
.s-Confirmed{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid rgba(16,185,129,0.3);}
.s-Pending{background:rgba(245,158,11,0.15);color:var(--pending);border:1px solid rgba(245,158,11,0.3);}
.s-Accepted{background:rgba(99,102,241,0.15);color:#818CF8;border:1px solid rgba(99,102,241,0.3);}
.s-Rejected{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
.s-PaidConfirmed{background:rgba(16,185,129,0.2);color:var(--success);border:1px solid rgba(16,185,129,0.4);}
.pay-btn{margin-top:10px;padding:7px 16px;background:var(--orange);border:none;color:white;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;display:block;transition:0.2s;}
.pay-btn:hover{background:var(--dark-orange);}
.pay-btn:disabled{background:#555;cursor:not-allowed;}
.empty{text-align:center;padding:60px 20px;color:var(--gray);}
.empty .icon{font-size:48px;margin-bottom:16px;}
.empty a{color:var(--orange);text-decoration:none;}
.empty a:hover{text-decoration:underline;}
.loading{text-align:center;padding:40px;color:var(--gray);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:768px){nav,.page-header,.stats-row,.tabs,.tab-content{padding-left:20px;padding-right:20px;}.booking-card{flex-wrap:wrap;}.booking-right{text-align:left;}}
</style>
</head>
<body>

<nav>
    <h2>Safar</h2>
    <div class="nav-btns">
        <button class="nav-btn" onclick="window.location.href='explore.html'">← Explore</button>
        <button class="nav-btn" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="page-header">
    <h1>My Dashboard</h1>
    <p id="welcomeMsg">Welcome back!</p>
</div>

<div class="stats-row">
    <div class="stat-card"><div class="num" id="statTotal">—</div><div class="lbl">Total Bookings</div></div>
    <div class="stat-card"><div class="num" id="statHotels">—</div><div class="lbl">Hotel Stays</div></div>
    <div class="stat-card"><div class="num" id="statActs">—</div><div class="lbl">Activities</div></div>
    <div class="stat-card"><div class="num" id="statSpend">—</div><div class="lbl">Total Spent</div></div>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('all',this)">All Bookings</button>
    <button class="tab" onclick="switchTab('hotel',this)">🏨 Hotels</button>
    <button class="tab" onclick="switchTab('activity',this)">🎯 Activities</button>
</div>

<div class="tab-content active" id="tab-all">
    <div id="allList"><div class="loading">Loading bookings…</div></div>
</div>
<div class="tab-content" id="tab-hotel">
    <div id="hotelList"></div>
</div>
<div class="tab-content" id="tab-activity">
    <div id="activityList"></div>
</div>

<script>
    const API = 'http://localhost:3000/api';

    const currentUser = JSON.parse(sessionStorage.getItem('loggedInUser'));
    if (!currentUser || currentUser.role !== 'user') { window.location.href = 'login.html'; }

    document.getElementById('welcomeMsg').innerText = 'Welcome back, ' + (currentUser.name || currentUser.email) + '!';

    // ── Status badge CSS class ──────────────────────
    function statusClass(s) {
        const map = {
            'Confirmed':       's-Confirmed',
            'Paid & Confirmed':'s-PaidConfirmed',
            'Pending':         's-Pending',
            'Accepted':        's-Accepted',
            'Rejected':        's-Rejected'
        };
        return map[s] || 's-Pending';
    }

    // ── Card builders ───────────────────────────────
    function hotelCard(b) {
        const payBtn = b.status === 'Accepted'
            ? `<button class="pay-btn" id="payBtn-${b.id}" onclick="pay(${b.id})">Pay Now ₹${Number(b.offered_price||b.original_price).toLocaleString()}</button>`
            : '';
        return `
        <div class="booking-card">
            <div class="booking-icon">🏨</div>
            <div class="booking-info">
                <h4>${b.property_name}</h4>
                <div class="meta">
                    <span>📅 ${b.checkin} → ${b.checkout}</span>
                    <span>👥 ${b.guests} guest(s)</span>
                    <span>💬 Offered: ₹${Number(b.offered_price||b.original_price).toLocaleString()}</span>
                    <span>📍 ${b.city||''}</span>
                </div>
            </div>
            <div class="booking-right">
                <div class="price">₹${Number(b.offered_price||b.original_price).toLocaleString()}<small>/night</small></div>
                <div class="status-badge ${statusClass(b.status)}">${b.status}</div>
                ${payBtn}
            </div>
        </div>`;
    }

    function activityCard(b) {
        return `
        <div class="booking-card">
            <div class="booking-icon">🎯</div>
            <div class="booking-info">
                <h4>${b.activity_name}</h4>
                <div class="meta">
                    <span>📍 ${b.city}</span>
                    <span>📅 ${b.date}</span>
                    <span>👥 ${b.people} person(s)</span>
                    <span>👤 ${b.contact_name}</span>
                </div>
            </div>
            <div class="booking-right">
                <div class="price">₹${Number(b.total).toLocaleString()}</div>
                <div class="status-badge ${statusClass(b.status)}">${b.status}</div>
            </div>
        </div>`;
    }

    function emptyState(icon, msg) {
        return `<div class="empty"><div class="icon">${icon}</div><p>${msg} <a href="explore.html">Start exploring →</a></p></div>`;
    }

    // ── Load all bookings from API ──────────────────
    async function loadDashboard() {
        try {
            const res  = await fetch(`${API}/bookings/user/${currentUser.id}`);
            const data = await res.json();

            if (!data.success) {
                document.getElementById('allList').innerHTML = emptyState('❌', 'Could not load bookings.');
                return;
            }

            const hotels     = data.hotel_bookings    || [];
            const activities = data.activity_bookings || [];
            const all        = [...hotels.map(h => ({...h,type:'hotel'})), ...activities.map(a => ({...a,type:'activity'}))]
                               .sort((a,b) => b.id - a.id);

            // Stats
            document.getElementById('statTotal').innerText  = all.length;
            document.getElementById('statHotels').innerText = hotels.length;
            document.getElementById('statActs').innerText   = activities.length;
            const spend = activities.reduce((s,b) => s + Number(b.total), 0)
                        + hotels.filter(b => b.status === 'Paid & Confirmed').reduce((s,b) => s + Number(b.offered_price||b.original_price), 0);
            document.getElementById('statSpend').innerText = '₹' + spend.toLocaleString();

            // All tab
            const allList = document.getElementById('allList');
            allList.innerHTML = all.length === 0 ? emptyState('📋','No bookings yet.') : all.map(b => b.type==='hotel' ? hotelCard(b) : activityCard(b)).join('');

            // Hotel tab
            const hotelList = document.getElementById('hotelList');
            hotelList.innerHTML = hotels.length === 0 ? emptyState('🏨','No hotel bookings yet.') : hotels.map(hotelCard).join('');

            // Activity tab
            const actList = document.getElementById('activityList');
            actList.innerHTML = activities.length === 0 ? emptyState('🎯','No activity bookings yet.') : activities.map(activityCard).join('');

        } catch (e) {
            document.getElementById('allList').innerHTML = `<div class="empty"><div class="icon">❌</div><p>Cannot reach server. Is the backend running?</p></div>`;
        }
    }

    // ── Pay Now ─────────────────────────────────────
    async function pay(id) {
        const btn = document.getElementById('payBtn-' + id);
        if (btn) { btn.disabled = true; btn.innerText = 'Processing…'; }

        try {
            const res  = await fetch(`${API}/bookings/hotel/${id}/status`, {
                method:  'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ status: 'Paid & Confirmed' })
            });
            const data = await res.json();

            if (data.success) {
                alert('✅ Payment successful! Booking confirmed.');
                loadDashboard();
            } else {
                alert(data.message || 'Payment failed.');
                if (btn) { btn.disabled = false; btn.innerText = 'Pay Now'; }
            }
        } catch (e) {
            alert('❌ Cannot reach server.');
            if (btn) { btn.disabled = false; btn.innerText = 'Pay Now'; }
        }
    }

    function switchTab(name, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
    }

    function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

    loadDashboard();
</script>
</body>
</html>
